<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lume — sign in</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        width: 320px;
        font-family: Inter, system-ui, sans-serif;
        font-size: 13px;
        color: #1a1a1a;
        background: #ffffff;
      }
      h1 {
        font-family: "Instrument Serif", serif;
        font-style: italic;
        font-weight: 400;
        font-size: 24px;
        margin: 0 0 8px;
      }
      .muted { color: #6b6b70; }
      textarea {
        width: 100%;
        height: 80px;
        box-sizing: border-box;
        margin: 8px 0;
        font-family: ui-monospace, monospace;
        font-size: 11px;
        padding: 6px;
      }
      button {
        background: #e37b8c;
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 999px;
        font-family: Inter, sans-serif;
        font-weight: 600;
        cursor: pointer;
      }
      button.secondary {
        background: transparent;
        color: #1a1a1a;
        border: 1px solid #b0b0b5;
      }
      .ok { color: #2f4823; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
